<!-- views/admin/registrar-doacao.html -->
<section id="registrarDoacao" class="page-section hidden">
    <div class="form-container">
        <h3>Registrar Nova Doação</h3>
        <form id="formRegistro">
            <div class="form-grid">
                <div class="form-group">
                    <label>Matrícula do Aluno</label>
                    <input type="text" placeholder="Ex: 123456" required>
                </div>
                <div class="form-group">
                    <label>Campanha</label>
                    <select required>
                        <option value="1">Inverno Solidário</option>
                        <option value="2">Natal sem Fome</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tipo de Item</label>
                    <input type="text" placeholder="Ex: Casaco, 1kg Arroz" required>
                </div>
                <div class="form-group">
                    <label>Quantidade</label>
                    <input type="number" min="1" required>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 1rem;">Salvar Registro</button>
        </form>
    </div>
</section>
