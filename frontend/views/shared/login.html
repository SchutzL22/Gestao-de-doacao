<!-- views/shared/login.html -->
<div id="loginView" class="view-container active">
    <div class="login-box">
        <div class="logo-icon"><i class="fa-solid fa-hand-holding-heart"></i></div>
        <h1>COPER - FMP</h1>
        <p>Acesso ao Sistema de Doações</p>

        <form id="loginForm">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="text" id="email" placeholder="E-mail Institucional (@aluno.fmpsc.edu.br)" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="senha" placeholder="Senha" required>
            </div>
            <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <div class="demo-credentials">
            <span><strong>Admin:</strong> admin@fmp.edu.br / admin</span><br>
            <span><strong>Aluno:</strong> aluno@aluno.fmpsc.edu.br / aluno</span>
        </div>
    </div>
</div>
