<!-- views/shared/editar-perfil.html -->
<section id="editarPerfil" class="page-section hidden">
    <div class="form-container">
        <h3>Editar Meu Perfil</h3>
        <form id="formPerfil">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="perfilNome" required>
                </div>
                <div class="form-group">
                    <label>E-mail de Acesso</label>
                    <input type="email" id="perfilEmail" required>
                </div>
                <div class="form-group">
                    <label>Nova Senha</label>
                    <input type="password" id="perfilSenha" placeholder="Deixe em branco para manter a atual">
                </div>
                <div class="form-group">
                    <label id="labelIdentificador">Documento de Identificação</label>
                    <input type="text" id="perfilIdentificador" readonly
                        style="background-color: var(--secondary); cursor: not-allowed;">
                </div>
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 1rem;">Salvar Alterações</button>
        </form>
    </div>
</section>
